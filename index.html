<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloxGlobe Studio</title>
  <link rel="icon" type="image/png" href="assets/BloxGlobe.png" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      border-right: 1px solid #222;
    }
    .sidebar h2 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 25px;
    }
    .nav-item {
      padding: 14px 25px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 16px;
      color: #fff;
      text-decoration: none;
      display: block;
    }
    .nav-item:hover {
      background: #1a1a1a;
    }

    /* Main content area */
    .content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    h1 {
      margin-top: 0;
    }

    /* Game cards */
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .game-card {
      background: #111;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #222;
      transition: 0.25s;
    }
    .game-card:hover {
      transform: scale(1.03);
      background: #151515;
    }
    .game-card h3 {
      margin-top: 0;
    }

    .update-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #333;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      transition: 0.2s;
    }
    .update-btn:hover {
      background: #444;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
<div class="sidebar">
  <h2>Dashboard</h2>
  <nav>
    <a class="nav-item" href="home.html" onclick="loadPage('home.html'); return false;">Home</a>
    <a class="nav-item" href="games.html" onclick="loadPage('games.html'); return false;">Games</a>
    <a class="nav-item" href="ugc.html" onclick="loadPage('ugc.html'); return false;">UGC Clothing</a>
    <a class="nav-item" href="updates.html" onclick="loadPage('updates.html'); return false;">Site Updates</a>
    <a class="nav-item" href="feedback.html" onclick="loadPage('feedback.html'); return false;">Feedback</a>
    <a class="nav-item" href="settings.html" onclick="loadPage('settings.html'); return false;">Settings</a>
  </nav>

  <div style="margin-top:auto; text-align:center; font-size:12px; padding:15px; color:#777;">
    <img src="assets/BloxGlobe.png" alt="Logo" style="width:20px; vertical-align:middle; margin-right:6px; opacity:0.8;">
    © BloxGlobe™ 2025
  </div>
</div>
