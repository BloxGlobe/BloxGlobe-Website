<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ✅ Makes it responsive -->
  <title>BloxGlobe Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Smooth dropdown animation */
    .dropdown-enter {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.4s ease;
    }
    .dropdown-enter-active {
      max-height: 500px;
      opacity: 1;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans">

  <div class="p-6 w-full max-w-2xl mx-auto mt-10 bg-gray-900 rounded-2xl shadow-lg border border-gray-800">
    <!-- Dropdown Header -->
    <button id="toggleUpdates" class="w-full flex justify-between items-center text-lg font-semibold">
      <span>Update Log</span>
      <svg id="arrowIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    <!-- Dropdown Content -->
    <div id="updateContent" class="dropdown-enter mt-4 space-y-2">
      <p>🔥 Version 1.5.4 - Optimized layout & UI polish</p>
      <p>💬 Feedback system connected</p>
      <p>🧠 Backend sync improvements</p>
    </div>
  </div>

  <footer class="text-center mt-10 text-sm text-gray-400">
    © 2025 <strong>BloxGlobe Studio™</strong>. All rights reserved.  
    <br>Developed with ❤️ by Abel
  </footer>

  <script>
    const toggleBtn = document.getElementById('toggleUpdates');
    const updateContent = document.getElementById('updateContent');
    const arrowIcon = document.getElementById('arrowIcon');
    let isOpen = true;

    toggleBtn.addEventListener('click', () => {
      isOpen = !isOpen;
      if (isOpen) {
        updateContent.classList.add('dropdown-enter-active');
        updateContent.classList.remove('dropdown-enter');
      } else {
        updateContent.classList.add('dropdown-enter');
        updateContent.classList.remove('dropdown-enter-active');
      }
      arrowIcon.classList.toggle('rotate-180');
    });
  </script>
</body>
</html>
