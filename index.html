<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloxGlobe Studio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
    }
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      border-right: 1px solid #222;
    }
    .sidebar h2 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 25px;
    }
    .nav-item {
      padding: 14px 25px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 16px;
    }
    .nav-item:hover {
      background: #1a1a1a;
    }
    /* Main content */
    .content {
      flex: 1;
      padding: 30px;
    }
    h1 {
      margin-top: 0;
    }
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .game-card {
      background: #111;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #222;
      transition: 0.25s;
    }
    .game-card:hover {
      transform: scale(1.03);
      background: #151515;
    }
    .game-card h3 {
      margin-top: 0;
    }
    .update-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #333;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      transition: 0.2s;
    }
    .update-btn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Dashboard</h2>
    <div class="nav-item">Home</div>
    <div class="nav-item">Games</div>
    <div class="nav-item">UGC Clothing</div>
    <div class="nav-item"></div>
    <div class="nav-item">Site Updates</div>
    <div class="nav-item">Feedback</div>
    <div class="nav-item">Settings</div>
  </div>

  <div class="content">
    <h1>Managed Games</h1>
    <div class="games">
      <div class="game-card">
        <h3>R26</h3>
        <p>Your upcoming Roblox project.</p>
        <a href="https://www.roblox.com/games/9562232795/R26" class="update-btn">View Game Page</a>
      </div>
      <div class="game-card">
        <h3>ReadyNode [Beta]</h3>
        <p>Beta testing in progress.</p>
        <a href="https://www.roblox.com/games/15950825340/ReadyNode-Beta" class="update-btn">View Game Page</a>
      </div>
    </div>
  </div>
</body>
</html>
